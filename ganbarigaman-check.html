<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたの頑張り・我慢度チェック｜I love me.</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --peach:   #fbd5be;
  --peach2:  #f7a98a;
  --peach3:  #f08060;
  --lilac:   #e8d8f8;
  --lilac2:  #c0a0e0;
  --lilac3:  #9070c8;
  --mint:    #c8ead8;
  --mint2:   #70c0a0;
  --rose:    #f8c0d0;
  --rose2:   #e8809a;
  --gold:    #f8e080;
  --gold2:   #d8a830;
  --cream:   #fdf8f0;
  --warm:    #faf4ec;
  --white:   #ffffff;
  --char:    #3a3038;
  --mid:     #806878;
  --light:   #e8d8e8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--warm);
  color: var(--char);
  min-height: 100vh;
}

/* ── BG ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(251,213,190,0.5) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 100% 20%, rgba(232,216,248,0.45) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 30% 100%, rgba(200,234,216,0.35) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 80% 80%,  rgba(248,192,208,0.3) 0%, transparent 55%);
}

/* ── SCREENS ── */
.screen { display:none; position:relative; z-index:1; }
.screen.active { display:block; animation: fadeUp 0.4s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* ── INTRO ── */
.intro {
  max-width: 480px;
  margin: 0 auto;
  padding: 52px 24px 60px;
  text-align: center;
}
.intro-badge {
  display:inline-block;
  background: rgba(192,160,224,0.2);
  border: 1px solid rgba(192,160,224,0.4);
  color: var(--lilac3);
  font-size: 0.7rem; letter-spacing: 2px;
  padding: 5px 16px; border-radius: 100px;
  margin-bottom: 20px;
}
.intro h1 {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: clamp(2rem, 7vw, 2.8rem);
  background: linear-gradient(135deg, #c87090, #a070c0, #60b090);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.15; margin-bottom: 10px;
}
.intro-sub {
  font-size: 1rem; color: var(--mid); margin-bottom: 6px; font-weight: 300; line-height: 1.6;
}
.intro-desc {
  font-size: 0.82rem; color: var(--mid); line-height: 1.8; margin: 18px 0 28px;
}
.intro-time {
  display:inline-flex; align-items:center; gap:6px;
  background: rgba(255,255,255,0.7); border-radius: 100px;
  padding: 6px 16px; font-size: 0.78rem; color: var(--mid);
  margin-bottom: 28px;
}
.start-btn {
  display: block; width: 100%;
  background: linear-gradient(135deg, #d080a0, #a070c0, #60b090);
  color: #fff; border: none;
  padding: 16px; border-radius: 100px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 1rem; font-weight: 500;
  cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 6px 24px rgba(160,112,192,0.35);
  transition: all 0.25s;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(160,112,192,0.45); }

.intro-illust {
  font-size: 3.5rem; margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
}

/* ── QUIZ ── */
.quiz-wrap {
  max-width: 520px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

/* section label */
.section-banner {
  border-radius: 16px; padding: 14px 20px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.sb-ganbari { background: linear-gradient(120deg, rgba(251,213,190,0.7), rgba(247,169,138,0.4)); border: 1px solid rgba(247,169,138,0.5); }
.sb-gaman   { background: linear-gradient(120deg, rgba(232,216,248,0.7), rgba(192,160,224,0.4)); border: 1px solid rgba(192,160,224,0.5); }
.sb-icon { font-size: 1.4rem; }
.sb-info {}
.sb-label { font-size: 0.68rem; letter-spacing: 2px; color: var(--mid); margin-bottom: 2px; }
.sb-title { font-size: 1rem; font-weight: 700; }

/* progress */
.progress-wrap { margin-bottom: 24px; }
.progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.progress-label { font-size: 0.75rem; color: var(--mid); }
.progress-pct   { font-size: 0.8rem; font-weight: 700; color: var(--lilac3); }
.progress-bar { height: 6px; background: var(--light); border-radius: 100px; overflow: hidden; }
.progress-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, #d080a0, #a070c0, #60b090);
  transition: width 0.5s ease;
}

/* question card */
.q-card {
  background: var(--white);
  border: 1px solid rgba(200,160,220,0.2);
  border-radius: 20px;
  padding: 26px 22px;
  box-shadow: 0 4px 20px rgba(160,100,180,0.08);
  margin-bottom: 16px;
}
.q-num {
  font-size: 0.68rem; letter-spacing: 2px; color: var(--lilac3); margin-bottom: 10px;
}
.q-text {
  font-size: 1rem; font-weight: 500; line-height: 1.6; margin-bottom: 20px;
}

/* options */
.options { display: flex; flex-direction: column; gap: 9px; }
.opt-btn {
  padding: 12px 16px;
  border: 2px solid var(--light);
  border-radius: 14px;
  background: var(--warm);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.86rem; color: var(--char);
  cursor: pointer; text-align: left;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 10px;
}
.opt-btn:hover { border-color: var(--lilac2); background: rgba(232,216,248,0.2); }
.opt-btn.selected {
  border-color: var(--lilac3);
  background: linear-gradient(135deg, rgba(232,216,248,0.5), rgba(200,234,216,0.3));
  color: var(--char);
}
.opt-icon { font-size: 1rem; flex-shrink: 0; }

/* nav */
.nav-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 20px;
}
.nav-back {
  background: transparent; border: 1px solid var(--light);
  color: var(--mid); padding: 10px 20px; border-radius: 100px;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 0.82rem;
  cursor: pointer; transition: all 0.2s;
}
.nav-back:hover { border-color: var(--lilac2); }
.nav-next {
  background: linear-gradient(135deg, var(--lilac3), var(--mint2));
  color: #fff; border: none; padding: 12px 28px; border-radius: 100px;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 0.86rem;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(144,112,200,0.3);
}
.nav-next:hover { opacity: 0.88; transform: translateY(-1px); }
.nav-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── RESULT ── */
.result-wrap {
  max-width: 520px;
  margin: 0 auto;
  padding: 36px 20px 60px;
}
.result-header { text-align: center; margin-bottom: 28px; }
.result-eyebrow { font-size: 0.72rem; letter-spacing: 2px; color: var(--mid); margin-bottom: 10px; }
.result-type {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: clamp(1.4rem, 5vw, 2rem);
  line-height: 1.3; margin-bottom: 8px;
}
.result-tag {
  display: inline-block;
  padding: 5px 18px; border-radius: 100px;
  font-size: 0.76rem; font-weight: 500;
  margin-bottom: 16px;
}

/* score bars */
.score-cards {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 22px;
}
.score-card {
  background: var(--white); border-radius: 16px;
  padding: 18px 16px; text-align: center;
  border: 1px solid rgba(200,160,220,0.2);
  box-shadow: 0 3px 14px rgba(160,100,180,0.07);
}
.sc-label { font-size: 0.72rem; color: var(--mid); margin-bottom: 8px; }
.sc-score {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 2.4rem; font-weight: 700; line-height: 1;
  margin-bottom: 4px;
}
.sc-max { font-size: 0.7rem; color: var(--mid); }
.sc-bar { height: 6px; background: var(--light); border-radius: 100px; margin-top: 10px; overflow: hidden; }
.sc-fill { height: 100%; border-radius: 100px; transition: width 0.8s ease; }
.fill-ganbari { background: linear-gradient(90deg, var(--peach2), var(--rose2)); }
.fill-gaman   { background: linear-gradient(90deg, var(--lilac2), var(--lilac3)); }

/* result message */
.result-card {
  background: var(--white);
  border-radius: 20px; padding: 24px 22px;
  border: 1px solid rgba(200,160,220,0.2);
  box-shadow: 0 4px 20px rgba(160,100,180,0.08);
  margin-bottom: 16px;
}
.rc-icon { font-size: 2rem; margin-bottom: 10px; }
.rc-title { font-size: 1rem; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
.rc-body  { font-size: 0.86rem; color: var(--mid); line-height: 1.8; }
.rc-body strong { color: var(--char); }

/* advice pills */
.advice-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; }
.advice-pill {
  background: var(--cream); border: 1px solid var(--light);
  border-radius: 100px; padding: 5px 13px;
  font-size: 0.76rem; color: var(--char);
}

/* share → LINE */
.line-register-section { text-align: center; margin-top: 24px; }
.line-register-btn {
  display: inline-flex; align-items: center; gap: 10px;
  background: #06c755; color: #fff;
  padding: 15px 32px; border-radius: 100px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.95rem; font-weight: 700;
  text-decoration: none;
  box-shadow: 0 5px 20px rgba(6,199,85,0.35);
  transition: all 0.25s;
}
.line-register-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 24px rgba(6,199,85,0.45); }
.line-register-note { font-size: 0.74rem; color: var(--mid); margin-top: 10px; }
.energy-btn {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #a070c0, #6dbfa8);
  color: #fff; padding: 15px 32px; border-radius: 100px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.95rem; font-weight: 700;
  text-decoration: none;
  box-shadow: 0 5px 20px rgba(160,112,192,0.35);
  transition: all 0.25s; margin-top: 8px;
}
.energy-btn:hover { transform: translateY(-2px); }
.cta-btn-row { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.retry-btn {
  display: block; width: 100%; margin-top: 16px;
  background: transparent; border: 1.5px solid var(--light);
  color: var(--mid); padding: 12px;
  border-radius: 100px; font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.86rem; cursor: pointer; transition: all 0.2s;
}
.retry-btn:hover { border-color: var(--lilac2); color: var(--lilac3); }

.program-cta {
  background: linear-gradient(135deg, rgba(251,213,190,0.6), rgba(232,216,248,0.6));
  border: 1px solid rgba(192,160,224,0.35);
  border-radius: 20px; padding: 22px;
  text-align: center; margin-top: 16px;
}
.cta-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; }
.cta-body  { font-size: 0.8rem; color: var(--mid); line-height: 1.7; margin-bottom: 14px; }
.cta-btn {
  display: inline-block;
  background: linear-gradient(135deg, #d080a0, #a070c0);
  color: #fff; text-decoration: none;
  padding: 11px 28px; border-radius: 100px;
  font-size: 0.86rem; font-weight: 500;
  box-shadow: 0 4px 16px rgba(160,112,192,0.3);
}
</style>
</head>
<body>

<!-- ══════════════ INTRO ══════════════ -->
<div class="screen active" id="screen-intro">
  <div class="intro">
    <div class="intro-badge">無料診断 ｜ I love me.</div>
    <div class="intro-illust">🌸</div>
    <h1>あなたの<br>頑張り・我慢度<br>チェック</h1>
    <div class="intro-sub">あなたは今、どのくらい自分を後回しにしていますか？</div>
    <div class="intro-desc">
      行動パターンと身体のサインから<br>
      「頑張り度」「我慢度」を数値化します。<br>
      最後に、今のあなたへのメッセージをお届けします。
    </div>
    <div class="intro-time">⏱ 所要時間 約2〜3分 ｜ 全16問</div>
    <button class="start-btn" onclick="startQuiz()">診断スタート →</button>
  </div>
</div>

<!-- ══════════════ QUIZ ══════════════ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-wrap">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label" id="progressLabel">1 / 16</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div id="sectionBanner"></div>
    <div class="q-card">
      <div class="q-num" id="qNum">Q01</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="qOptions"></div>
    </div>
    <div class="nav-row">
      <button class="nav-back" id="btnBack" onclick="prevQ()">← 戻る</button>
      <button class="nav-next" id="btnNext" onclick="nextQ()" disabled>次へ →</button>
    </div>
  </div>
</div>

<!-- ══════════════ RESULT ══════════════ -->
<div class="screen" id="screen-result">
  <div class="result-wrap">
    <div class="result-header">
      <div class="result-eyebrow">診断結果</div>
      <div class="result-type" id="resultType"></div>
      <div class="result-tag" id="resultTag"></div>

      <div class="score-card">
        <div class="sc-label">🔥 頑張り度</div>
        <div class="sc-score" id="scoreG" style="color:#e08080">0</div>
        <div class="sc-max">/ 40点</div>
        <div class="sc-bar"><div class="sc-fill fill-ganbari" id="barG" style="width:0%"></div></div>
      </div>
      <div class="score-card">
        <div class="sc-label">💜 我慢度</div>
        <div class="sc-score" id="scoreM" style="color:#a070c0">0</div>
        <div class="sc-max">/ 40点</div>
        <div class="sc-bar"><div class="sc-fill fill-gaman" id="barM" style="width:0%"></div></div>
      </div>
    </div>
    <div id="resultCards"></div>
    <div id="ctaSection"></div>
    <button class="retry-btn" onclick="retry()">もう一度診断する</button>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  QUESTIONS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const questions = [

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let answers = new Array(questions.length).fill(null);
let currentQ = 0;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  QUIZ LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function startQuiz() {
  showScreen('quiz');
  renderQ();
}

function renderQ() {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round((currentQ / total) * 100);

  document.getElementById('progressLabel').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('qNum').textContent = 'Q' + String(currentQ + 1).padStart(2, '0');
  document.getElementById('qText').textContent = q.text;

  // section banner
  const isGanbari = q.section === 'ganbari';
  const prevSection = currentQ > 0 ? questions[currentQ-1].section : null;
  const showBanner = currentQ === 0 || q.section !== prevSection;
  const bannerEl = document.getElementById('sectionBanner');
  if (showBanner) {
    bannerEl.innerHTML = `
      <div class="section-banner ${isGanbari ? 'sb-ganbari' : 'sb-gaman'}">
        <div class="sb-icon">${isGanbari ? '🔥' : '💜'}</div>
        <div class="sb-info">
          <div class="sb-label">${isGanbari ? 'PART 1' : 'PART 2'}</div>
          <div class="sb-title">${isGanbari ? '行動・思考パターン（頑張り度）' : '身体のサイン（我慢度）'}</div>
        </div>
      </div>`;
  } else {
    bannerEl.innerHTML = '';
  }

  // options
  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = opts.map((o, i) => `
    <button class="opt-btn ${answers[currentQ] === i ? 'selected' : ''}"
            onclick="selectOpt(${i})">
      ${o.label}
    </button>
  `).join('');

  document.getElementById('btnBack').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  document.getElementById('btnNext').disabled = answers[currentQ] === null;
  document.getElementById('btnNext').textContent = currentQ === total - 1 ? '結果を見る ✨' : '次へ →';
}

function selectOpt(i) {
  answers[currentQ] = i;
  document.querySelectorAll('.opt-btn').forEach((b, idx) => {
    b.classList.toggle('selected', idx === i);
  });
  document.getElementById('btnNext').disabled = false;
}

function nextQ() {
  if (answers[currentQ] === null) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQ();
    window.scrollTo({top:0, behavior:'smooth'});
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQ(); }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  RESULT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showResult() {
  let gScore = 0, mScore = 0;

  document.getElementById('scoreM').textContent = mScore;

            公式LINEに登録する

  } else if (r.ctaType === 'mid') {
    ctaHtml = `

  } else {
    ctaHtml = `

        <div class="cta-body">波動を整えるエネルギー整体を体験してみてください！<br>日々の浄化で、今の心地よさをさらに深めることができます。</div>

  }
  document.getElementById('ctaSection').innerHTML = ctaHtml;

  showScreen('result');

function shareX() {}

function retry() {
  answers = new Array(questions.length).fill(null);
  currentQ = 0;
  showScreen('intro');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
